<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeroStudio - Core Architecture Unit Tests</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0f172a;
      color: #e2e8f0;
      padding: 40px;
      margin: 0;
    }
    h1 {
      font-size: 24px;
      margin-bottom: 20px;
      background: linear-gradient(to right, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .test-box {
      background-color: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    }
    .test-case {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 6px;
      background-color: #0f172a;
    }
    .status {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 15px;
    }
    .status.passed {
      background-color: #10b981;
      box-shadow: 0 0 8px #10b981;
    }
    .status.failed {
      background-color: #ef4444;
      box-shadow: 0 0 8px #ef4444;
    }
    .name {
      font-weight: 600;
      flex: 1;
    }
    .message {
      font-size: 0.85rem;
      color: #94a3b8;
    }
    .summary-bar {
      margin-top: 20px;
      font-size: 1.1rem;
      font-weight: bold;
    }
    .btn-back {
      margin-top: 20px;
      display: inline-block;
      padding: 10px 20px;
      background-color: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 500;
      transition: background-color 0.2s;
    }
    .btn-back:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>

  <h1>VeroStudio Core Diagnostic Tests</h1>
  
  <div class="test-box">
    <div id="test-results">Running unit tests...</div>
    <div id="summary" class="summary-bar"></div>
  </div>

  <a href="../index.html" class="btn-back">Return to App</a>

  <script type="module">
    import { AppState } from '../src/core/app-state.js';
    import { CommandManager } from '../src/core/command-manager.js';
    import { 
      ResizeBoardCommand, 
      UpdateProjectNameCommand, 
      SetThemeCommand,
      AddComponentCommand,
      AddWireCommand,
      DeleteWiresCommand,
      UpdateWirePropertyCommand
    } from '../src/core/commands.js';
    import { CanvasController } from '../src/canvas/canvas-controller.js';
    import { Viewport } from '../src/canvas/viewport.js';
    import { GridRenderer } from '../src/canvas/grid-renderer.js';
    import { ComponentModel } from '../src/models/component-model.js';
    import { defaultRegistry } from '../src/components/registry.js';
    import { WireModel } from '../src/models/wire-model.js';
    import { serializeProject } from '../src/utils/file.js';

    const resultsContainer = document.getElementById('test-results');
    const summaryContainer = document.getElementById('summary');
    resultsContainer.innerHTML = '';

    let passedCount = 0;
    let failedCount = 0;

    function assert(name, condition, failureMessage = "Assertion failed") {
      const caseDiv = document.createElement('div');
      caseDiv.className = 'test-case';
      
      const statusSpan = document.createElement('span');
      
      if (condition) {
        statusSpan.className = 'status passed';
        passedCount++;
      } else {
        statusSpan.className = 'status failed';
        failedCount++;
      }
      
      const nameDiv = document.createElement('div');
      nameDiv.className = 'name';
      nameDiv.textContent = name;
      
      const msgDiv = document.createElement('div');
      msgDiv.className = 'message';
      msgDiv.textContent = condition ? 'Passed' : `Failed: ${failureMessage}`;
      if (!condition) msgDiv.style.color = '#f87171';

      caseDiv.appendChild(statusSpan);
      caseDiv.appendChild(nameDiv);
      caseDiv.appendChild(msgDiv);
      resultsContainer.appendChild(caseDiv);
    }

    try {
      // Test 1: Initialize AppState defaults
      const state = new AppState();
      assert("AppState initialization defaults", 
        state.project.name === "Untitled Perfboard" && 
        state.project.board.width === 30 &&
        state.project.board.height === 20 &&
        state.project.board.theme === "dark",
        "Default state is incorrect"
      );

      // Test 2: Subscriptions notify on changes
      let notified = false;
      let notifiedData = null;
      state.subscribe('project', (data) => {
        notified = true;
        notifiedData = data;
      });

      state.updateProject((project) => {
        project.name = "Test Board Name";
      });

      assert("AppState event dispatching updates sub-members",
        notified === true && notifiedData.name === "Test Board Name",
        "Subscription event was not fired or contained outdated data"
      );

      // Test 3: Command execution
      const manager = new CommandManager(state);
      const resizeCmd = new ResizeBoardCommand(50, 40);
      
      manager.execute(resizeCmd);
      assert("Command execution updates board state",
        state.project.board.width === 50 && state.project.board.height === 40,
        `Expected 50x40, got ${state.project.board.width}x${state.project.board.height}`
      );
      assert("Undo stack has the executed command",
        manager.undoStack.length === 1 && manager.canUndo() === true,
        "Undo stack is empty or reports incorrect length"
      );

      // Test 4: Command Undo
      manager.undo();
      assert("Undo restores previous board size state",
        state.project.board.width === 30 && state.project.board.height === 20,
        `Expected 30x20, got ${state.project.board.width}x${state.project.board.height}`
      );
      assert("Redo stack has the reverted command",
        manager.redoStack.length === 1 && manager.canRedo() === true,
        "Redo stack size does not show correct reverted count"
      );

      // Test 5: Command Redo
      manager.redo();
      assert("Redo re-applies board size state",
        state.project.board.width === 50 && state.project.board.height === 40,
        `Expected 50x40, got ${state.project.board.width}x${state.project.board.height}`
      );

      // Test 6: Theme Command changes state
      const themeCmd = new SetThemeCommand('light');
      manager.execute(themeCmd);
      assert("SetThemeCommand updates project theme config",
        state.project.board.theme === 'light',
        "Theme state was not changed to light"
      );
      
      manager.undo();
      assert("Undo theme command restores theme to dark",
        state.project.board.theme === 'dark',
        "Theme state was not reverted back to dark"
      );

      // Test 7: CanvasController initialization
      const mockCanvas = document.createElement('canvas');
      const canvasWrapper = document.createElement('div');
      canvasWrapper.style.width = '300px';
      canvasWrapper.style.height = '200px';
      canvasWrapper.appendChild(mockCanvas);
      document.body.appendChild(canvasWrapper);

      const canvasController = new CanvasController(state);
      canvasController.initialize(mockCanvas);

      assert("CanvasController context binding", 
        canvasController.canvas === mockCanvas && canvasController.ctx !== null,
        "Canvas or context failed to initialize"
      );
      assert("CanvasController handles redraw flags",
        canvasController.needsRedraw === true,
        "Redraw should be requested after resize initialization"
      );

      // Cleanup
      canvasController.destroy();
      document.body.removeChild(canvasWrapper);

      // Test 8: Viewport coordinate conversions
      const testViewport = new Viewport(state);
      // Reset viewport state parameters for isolated test
      state.updateViewport({ panX: 100, panY: 50, zoom: 2.0 });

      // Spacing is 24px, zoom is 2x, total scale factor is 48px/unit
      // Grid coord (1, 1) -> Screen coord (100 + 48 = 148, 50 + 48 = 98)
      const screenPos = testViewport.gridToScreen(1, 1);
      assert("Viewport gridToScreen conversion",
        screenPos.x === 148 && screenPos.y === 98,
        `Expected screen (148, 98), got (${screenPos.x}, ${screenPos.y})`
      );

      // Screen (148, 98) -> Grid (1, 1)
      const gridPos = testViewport.screenToGrid(148, 98);
      assert("Viewport screenToGrid conversion",
        Math.abs(gridPos.x - 1.0) < 0.001 && Math.abs(gridPos.y - 1.0) < 0.001,
        `Expected grid (1, 1), got (${gridPos.x}, ${gridPos.y})`
      );

      // Snapping
      const snappedVec = testViewport.snapToGrid(1.4, 0.9);
      assert("Viewport grid coordinate snapping",
        snappedVec.x === 1 && snappedVec.y === 1,
        `Expected snapped (1, 1), got (${snappedVec.x}, ${snappedVec.y})`
      );

      // Zoom focus preservation
      // We zoom from 2.0 to 1.0 focusing on screen position (200, 100)
      testViewport.zoomTo(1.0, 200, 100);
      assert("Viewport zoom focus tracking pan adjustments",
        state.viewport.zoom === 1.0 && state.viewport.panX === 150 && state.viewport.panY === 75,
        `Expected zoom 1.0 and pan (150, 75), got zoom ${state.viewport.zoom} and pan (${state.viewport.panX}, ${state.viewport.panY})`
      );

      // Test 9: GridRenderer execution
      const gridRenderer = new GridRenderer();
      const mockCanvasForGrid = document.createElement('canvas');
      const mockCtx = mockCanvasForGrid.getContext('2d');
      let drawCrashed = false;
      try {
        gridRenderer.draw(mockCtx, state.project.board, 24, '#000000');
      } catch (err) {
        drawCrashed = true;
        console.error("GridRenderer draw failed:", err);
      }
      assert("GridRenderer executes successfully without crash",
        drawCrashed === false,
        "GridRenderer.draw threw an error"
      );

      // Test 10: Component Engine & Mathematical Rotations
      const resConfig = {
        id: 'R1_test',
        type: 'resistor',
        gridX: 5,
        gridY: 5,
        rotation: 0,
        flipped: false,
        properties: { value: '220' }
      };

      manager.execute(new AddComponentCommand(resConfig));
      const compInstance = state.project.components.find(c => c.id === 'R1_test');
      assert("Component added successfully to state",
        compInstance !== undefined && compInstance.properties.value === '220',
        "Component was not added or has missing property values"
      );

      const resDef = defaultRegistry.get('resistor');
      let pins = ComponentModel.getGlobalPins(compInstance, resDef);
      assert("ComponentModel pin positions at 0 rotation",
        pins.length === 2 && pins[0].x === 5 && pins[0].y === 5 && pins[1].x === 7 && pins[1].y === 5,
        `Expected pins (5,5) and (7,5), got (${pins[0]?.x},${pins[0]?.y}) and (${pins[1]?.x},${pins[1]?.y})`
      );

      // Test rotated positions (90 deg)
      compInstance.rotation = 90;
      pins = ComponentModel.getGlobalPins(compInstance, resDef);
      assert("ComponentModel pin positions at 90 rotation",
        pins[0].x === 5 && pins[0].y === 5 && pins[1].x === 5 && pins[1].y === 7,
        `Expected pins (5,5) and (5,7) at 90deg, got (${pins[0]?.x},${pins[0]?.y}) and (${pins[1]?.x},${pins[1]?.y})`
      );

      // Hit testing
      const hitCenter = ComponentModel.hitTest(compInstance, resDef, 5.0, 6.0);
      assert("ComponentModel bounding box hitTest",
        hitCenter === true,
        "Hit test failed to detect point inside bounding box"
      );

      // Undo Component Add
      manager.undo();
      assert("Undo removes component instance from state",
        state.project.components.findIndex(c => c.id === 'R1_test') === -1,
        "Undo failed to remove component"
      );

      // Test 11: Wire Model Geometry & Commands
      const testWire = {
        id: 'wire_test_1',
        color: '#ff0000',
        label: 'GND',
        thickness: 2,
        points: [{ x: 2, y: 3 }, { x: 8, y: 3 }]
      };

      // Geometry tests
      const wBox = WireModel.getBoundingBox(testWire);
      assert("WireModel bounding box math",
        wBox.minX === 2 && wBox.maxX === 8 && wBox.minY === 3 && wBox.maxY === 3,
        `Expected minX=2, maxX=8, got minX=${wBox.minX}, maxX=${wBox.maxX}`
      );

      const hitMid = WireModel.hitTest(testWire, 5, 3, 0.4);
      const hitFar = WireModel.hitTest(testWire, 5, 4, 0.4);
      assert("WireModel segment hit testing",
        hitMid === true && hitFar === false,
        `Expected hit at (5,3) true and (5,4) false, got ${hitMid} and ${hitFar}`
      );

      // Command test - Add Wire
      manager.execute(new AddWireCommand(testWire));
      assert("AddWireCommand adds wire to project state",
        state.project.wires.length === 1 && state.project.wires[0].id === 'wire_test_1',
        "Failed to add wire"
      );

      // Command test - Update property
      manager.execute(new UpdateWirePropertyCommand('wire_test_1', 'color', '#00ff00'));
      assert("UpdateWirePropertyCommand modifies color property",
        state.project.wires[0].color === '#00ff00',
        "Failed to update wire color"
      );

      manager.undo();
      assert("Undo wire property update restores color",
        state.project.wires[0].color === '#ff0000',
        "Failed to revert wire color update"
      );

      // Command test - Delete Wire
      manager.execute(new DeleteWiresCommand(['wire_test_1']));
      assert("DeleteWiresCommand removes wire from project state",
        state.project.wires.length === 0,
        "Failed to delete wire"
      );

      manager.undo();
      assert("Undo wire deletion restores wire to project state",
        state.project.wires.length === 1 && state.project.wires[0].id === 'wire_test_1',
        "Failed to undo wire deletion"
      );

      // Cleanup
      manager.execute(new DeleteWiresCommand(['wire_test_1']));

      // Test 12: Project Serialization
      const serialized = serializeProject(state);
      assert("serializeProject serializes basic metadata",
        serialized.name === "Untitled Perfboard" &&
        serialized.board.width === 30 &&
        serialized.board.height === 20 &&
        serialized.board.theme === "dark",
        `Expected name "Untitled Perfboard" and board 30x20 dark, got name "${serialized.name}" and board ${serialized.board?.width}x${serialized.board?.height} ${serialized.board?.theme}`
      );

    } catch (err) {
      console.error(err);
      assert("Crash-free execution", false, err.message);
    }

    summaryContainer.textContent = `Summary: ${passedCount} passed, ${failedCount} failed.`;
    summaryContainer.style.color = failedCount === 0 ? '#10b981' : '#ef4444';
  </script>
</body>
</html>
